<mat-toolbar class="header">
  <div class="toolbar-content">
    <span>USUÁRIOS</span>
    <div class="search-box">
      <mat-icon>search</mat-icon>
      <input type="text" [formControl]="searchControl" placeholder="Pesquisar...">
    </div>
  </div>
</mat-toolbar>

<div class="container">
  <p class="subtitle">Usuários cadastrados</p>

  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  }

  @if (errorMessage()) {
    <div class="error-container">
      <mat-icon color="warn">error_outline</mat-icon>
      <p>{{ errorMessage() }}</p>
      <button mat-button (click)="load()">Tentar novamente</button>
    </div>
  }

  @if (!loading() && !errorMessage()) {
    <div class="user-list">
      @for (user of filteredUsers(); track user.id) {
        <mat-card class="user-card">
          <mat-card-content class="card-layout">
            <mat-icon class="avatar">person</mat-icon>
            <div class="user-info">
              <span class="user-name">{{ user.nome }}</span>
              <span class="user-email">{{ user.email }}</span>
            </div>
            <span class="spacer"></span>
            <button mat-icon-button (click)="openForm(user)">
              <mat-icon>edit</mat-icon>
            </button>
          </mat-card-content>
        </mat-card>
      } @empty {
        <p class="empty-message">Nenhum usuário encontrado.</p>
      }
    </div>
  }

  <button mat-fab color="warn" class="fab-button" (click)="openForm()">
    <mat-icon>add</mat-icon>
  </button>
</div>
