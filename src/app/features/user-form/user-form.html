<h2 mat-dialog-title>
  @if (isEdit) {
    Editar usuário
  } @else {
    Novo usuário
  }
</h2>

<form [formGroup]="userForm" (ngSubmit)="save()">
  <mat-dialog-content class="form-container">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Usuário (e-mail)</mat-label>
      <input matInput formControlName="email" placeholder="email@exemplo.com">
      <mat-error *ngIf="userForm.get('email')?.hasError('required')">E-mail é obrigatório</mat-error>
      <mat-error *ngIf="userForm.get('email')?.hasError('email')">Formato de e-mail inválido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nome completo</mat-label>
      <input matInput formControlName="nome">
      <mat-error *ngIf="userForm.get('nome')?.hasError('required')">Nome é obrigatório</mat-error>
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>CPF</mat-label>
        <input matInput formControlName="cpf" placeholder="000.000.000-00">
        <mat-error *ngIf="userForm.get('cpf')?.hasError('required')">CPF obrigatório</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Telefone</mat-label>
        <input matInput formControlName="telefone">
        <mat-error *ngIf="userForm.get('telefone')?.hasError('required')">Telefone obrigatório</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Tipo</mat-label>
        <mat-select formControlName="tipoTelefone">
          <mat-option value="CELULAR">CELULAR</mat-option>
          <mat-option value="FIXO">FIXO</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <p class="sms-info">O usuário receberá uma senha provisória para acesso ao sistema por SMS.</p>

  </mat-dialog-content>

  <mat-dialog-actions align="start">
    <button mat-raised-button color="primary" type="submit" [disabled]="userForm.invalid">
      SALVAR
    </button>
  </mat-dialog-actions>
</form>
